# Manual bed tramming helper macros.
#
# Adapted from mrelwood's macro pack (mrelwoods_qidi_plus4_macros_3v5).
# Difference from the original: lowers run/hold current on BOTH Z steppers
# (stepper_z AND stepper_z1), not just one. The Plus4 uses dual-Z, so reducing
# only one leaves the other at full torque and can still damage the bed/nozzle
# if you run the head into it.
#
# Workflow (run from Fluidd console):
#   1. MANUAL_BED_START         -> homes all axes
#   2. MANUAL_BED_1             -> front-left corner, Z=0, do paper test, adjust screw
#   3. MANUAL_BED_2             -> front-right corner
#   4. MANUAL_BED_3             -> back-right corner
#   5. MANUAL_BED_4             -> back-left corner
#   6. MANUAL_BED_CENTER        -> center (sanity check)
#   7. Repeat 2-6 until all corners feel the same
#   8. MANUAL_BED_FINISH        -> restores Z current, raises head, runs G29, SAVE_CONFIG
#
# Low Z current during tramming means that if you crash the nozzle, the
# steppers will skip instead of gouging the plate.

[gcode_macro MANUAL_BED_START]
description: Home the printer before starting manual bed tramming
gcode:
    G28

[gcode_macro _MBT_GOTO]
description: Internal - move to X,Y with reduced Z current and touch down to Z=0
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    G0 Z5 F600
    G0 X{x} Y{y} F8000
    G4 P1000
    SET_TMC_CURRENT STEPPER=stepper_z  CURRENT=0.3 HOLDCURRENT=0.1
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT=0.3 HOLDCURRENT=0.1
    G0 Z0 F400

[gcode_macro MANUAL_BED_1]
description: Move to front-left corner for tramming
gcode:
    _MBT_GOTO X=24 Y=24

[gcode_macro MANUAL_BED_2]
description: Move to front-right corner for tramming
gcode:
    _MBT_GOTO X=282 Y=24

[gcode_macro MANUAL_BED_3]
description: Move to back-right corner for tramming
gcode:
    _MBT_GOTO X=282 Y=282

[gcode_macro MANUAL_BED_4]
description: Move to back-left corner for tramming
gcode:
    _MBT_GOTO X=24 Y=282

[gcode_macro MANUAL_BED_CENTER]
description: Move to bed center for tramming sanity check
gcode:
    _MBT_GOTO X=154 Y=154

[gcode_macro MANUAL_BED_FINISH]
description: Restore Z stepper current, raise head, run mesh, save
gcode:
    G0 Z10 F600
    SET_TMC_CURRENT STEPPER=stepper_z  CURRENT=1.07 HOLDCURRENT=1.07
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT=1.07 HOLDCURRENT=1.07
    G29
    SAVE_CONFIG
