# Cold-unload macros for Box slots 0-3.
#
# Purpose: when the filament is NOT actually loaded into the extruder (e.g. a
# previous load failed halfway, or you've manually inserted filament in the
# slot to test it), the normal UNLOAD_T0..T3 macros still heat the hotend to
# min_extrude_temp before running EXTRUDER_UNLOAD. This wastes 1-2 minutes.
#
# These macros skip the hotend heat by driving the slot's box_stepper directly
# via FORCE_MOVE -- which only works if the filament is in the bowden between
# the slot and the hub, NOT past the hub into the extruder tube. They safely
# abort if e_endstop (filament at extruder side) reads active.
#
# To enable, add to printer.cfg under the other [include] lines:
#   [include cold_unload.cfg]
#
# EXPERIMENTAL: driving a [box_stepper] via FORCE_MOVE depends on QIDI's box
# kinematics registering itself in Klipper's standard stepper registry. If the
# first test fails with "stepper not found", FORCE_MOVE can't reach it and the
# macros will need a different approach (likely a QIDI-internal box command
# that isn't documented in the cfg files).
#
# TEST PROCEDURE (do this once before relying on it):
#   1. Make sure nothing is loaded in the extruder (e_endstop reads 0).
#   2. Feed a short length of filament into slot 0 manually, past the slot
#      runout sensor but not all the way to the hub.
#   3. Run: COLD_UNLOAD_T0
#   4. If the slot0 stepper runs backwards and spits the filament out, good.
#      If you see "Unknown stepper 'box_stepper slot0'" or similar, FORCE_MOVE
#      can't drive these and you'll need QIDI support to find the right call.

[gcode_macro _COLD_UNLOAD_SLOT]
description: Internal helper - retract filament via slot's box_stepper without heating
gcode:
    {% set slot = params.SLOT|default('slot0')|string %}
    {% set distance = params.DISTANCE|default(-700)|float %}   # mm; negative = retract toward slot
    {% set velocity = params.VELOCITY|default(30)|float %}     # mm/s; box_stepper is geared, keep moderate
    {% set accel = params.ACCEL|default(200)|float %}

    # Safety: refuse to run if filament is at the extruder side of the hub.
    # If it is, the slot stepper alone cannot retract it; extruder gears are
    # holding the filament and we need the heated extruder path.
    {% set e_state = printer["box_extras"].e_endstop_state|default(0)|int %}
    {% if e_state == 1 %}
        { action_raise_error("COLD_UNLOAD aborted: filament is at the extruder (e_endstop=1). Use the normal UNLOAD_T%s which heats the hotend." % (slot|replace('slot',''))) }
    {% endif %}

    M118 Cold-unloading {slot} via FORCE_MOVE ({distance}mm @ {velocity}mm/s)

    # Disable filament sensors so they don't trip runout during the retract
    {% if printer["filament_motion_sensor box_motion_sensor"] %}
        SET_FILAMENT_SENSOR SENSOR=box_motion_sensor ENABLE=0
    {% endif %}

    # Drive the slot's stepper backwards. The stepper name Klipper registers
    # for a [box_stepper slot0] block should be "box_stepper slot0".
    FORCE_MOVE STEPPER="box_stepper {slot}" DISTANCE={distance} VELOCITY={velocity} ACCEL={accel}

    M400

    # Clear the relevant Box state so the firmware doesn't think something
    # is still loaded.
    {% set slot_num = slot|replace('slot','')|int %}
    SAVE_VARIABLE VARIABLE=runout_{slot_num} VALUE=0
    {% if printer.save_variables.variables.slot_sync == slot %}
        SAVE_VARIABLE VARIABLE=slot_sync VALUE='slot-1'
    {% endif %}

    M118 Cold-unload of {slot} complete. If filament did not fully retract, pull the rest by hand.


[gcode_macro COLD_UNLOAD_T0]
description: Retract slot 0 filament without heating the hotend
gcode:
    _COLD_UNLOAD_SLOT SLOT=slot0

[gcode_macro COLD_UNLOAD_T1]
description: Retract slot 1 filament without heating the hotend
gcode:
    _COLD_UNLOAD_SLOT SLOT=slot1

[gcode_macro COLD_UNLOAD_T2]
description: Retract slot 2 filament without heating the hotend
gcode:
    _COLD_UNLOAD_SLOT SLOT=slot2

[gcode_macro COLD_UNLOAD_T3]
description: Retract slot 3 filament without heating the hotend
gcode:
    _COLD_UNLOAD_SLOT SLOT=slot3
