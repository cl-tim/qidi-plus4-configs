# Homing-guarded wrappers for Box slot load/unload.
#
# Why this exists:
#   The stock T0-T3 and UNLOAD_T0-T3 macros in box1.cfg call EXTRUDER_LOAD /
#   EXTRUDER_UNLOAD, which internally move the toolhead to the purge chute
#   (around X=75). When triggered from Fluidd without homing first, that move
#   errors out with "Must home axis first". The Xindi touchscreen UI homes
#   before T-changes automatically, which is why this only bites from Fluidd.
#
# Why wrappers instead of rename_existing:
#   rename_existing fails on T0..T3 in this firmware ("Existing command 'T0'
#   not found") because QIDI's Klipper fork registers those names through the
#   tool-change path rather than the gcode_macro registry. So instead of
#   overriding T0 etc., these are separate commands: LOAD_T0 through LOAD_T3
#   and ULOAD_T0 through ULOAD_T3. Use these from Fluidd.
#
# Usage from Fluidd:
#   LOAD_T2      (instead of T2)
#   ULOAD_T0     (instead of UNLOAD_T0)
#
# How to include (already done in your printer.cfg):
#   [include box_overrides.cfg]

[gcode_macro LOAD_T0]
description: Home if needed, then load filament from slot 0
gcode:
    _CG28
    T0

[gcode_macro LOAD_T1]
description: Home if needed, then load filament from slot 1
gcode:
    _CG28
    T1

[gcode_macro LOAD_T2]
description: Home if needed, then load filament from slot 2
gcode:
    _CG28
    T2

[gcode_macro LOAD_T3]
description: Home if needed, then load filament from slot 3
gcode:
    _CG28
    T3

[gcode_macro ULOAD_T0]
description: Home if needed, then unload filament from slot 0
gcode:
    _CG28
    UNLOAD_T0

[gcode_macro ULOAD_T1]
description: Home if needed, then unload filament from slot 1
gcode:
    _CG28
    UNLOAD_T1

[gcode_macro ULOAD_T2]
description: Home if needed, then unload filament from slot 2
gcode:
    _CG28
    UNLOAD_T2

[gcode_macro ULOAD_T3]
description: Home if needed, then unload filament from slot 3
gcode:
    _CG28
    UNLOAD_T3
